<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gastou.app icon">
  <title>Gastou.app</title>

  <!-- White circle background -->
  <circle cx="256" cy="256" r="256" fill="#ffffff"/>

  <!-- Receipt body -->
  <rect x="148" y="72" width="216" height="280" rx="20" ry="20" fill="#2D7A5F"/>

  <!-- Torn bottom edge -->
  <path d="M148,290 L148,352
           Q167,334 186,352
           Q205,370 224,352
           Q243,334 262,352
           Q281,370 300,352
           Q319,334 338,352
           Q357,370 364,352
           L364,290 Z"
        fill="#2D7A5F"/>

  <!-- Lines on receipt -->
  <line x1="186" y1="136" x2="306" y2="136" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="186" y1="178" x2="278" y2="178" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <line x1="186" y1="220" x2="296" y2="220" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.5"/>

  <!-- Outer ring (subtle shadow separation) -->
  <circle cx="364" cy="374" r="86" fill="#ffffff"/>
  <circle cx="364" cy="374" r="76" fill="#F5F0EB"/>
  <!-- Green checkmark circle -->
  <circle cx="364" cy="374" r="64" fill="#2D7A5F"/>
  <!-- Checkmark -->
  <polyline points="334,374 354,394 394,344"
            fill="none"
            stroke="#ffffff"
            stroke-width="14"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
