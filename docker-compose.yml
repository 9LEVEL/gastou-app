name: gastou-free

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "0.0.0.0:8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/mercado.db
      - PORT=8081
      - HOST=0.0.0.0
      - MIGRATIONS=./migrations/sqlite
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 32M
        reservations:
          cpus: "0.1"
          memory: 16M
    labels:
      - "traefik.enable=false"
    restart: unless-stopped
